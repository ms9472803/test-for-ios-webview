name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_PAGES_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Verify GitHub Pages is enabled
        if: ${{ env.GH_PAGES_TOKEN == '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_API_URL: ${{ github.api_url }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          from urllib import error, request

          url = f"{os.environ['GH_API_URL']}/repos/{os.environ['GH_REPOSITORY']}/pages"
          req = request.Request(
              url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )

          try:
              with request.urlopen(req) as response:
                  json.load(response)
          except error.HTTPError as exc:
              if exc.code == 404:
                  sys.stderr.write(
                      "GitHub Pages is not enabled for this repository yet.\n"
                      "Go to Settings > Pages and set Source to GitHub Actions, then rerun this workflow.\n"
                      "To auto-enable Pages from the workflow, add a GH_PAGES_TOKEN secret with the required admin permissions.\n"
                  )
              raise
          PY

      - name: Configure GitHub Pages
        if: ${{ env.GH_PAGES_TOKEN != '' }}
        uses: actions/configure-pages@v5
        with:
          token: ${{ env.GH_PAGES_TOKEN }}
          enablement: true

      - name: Configure GitHub Pages
        if: ${{ env.GH_PAGES_TOKEN == '' }}
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build project
        run: yarn build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
